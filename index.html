<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AR Portfolio Viewer</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  
  <style>
    :root {
      --bg: #f5f6f7; --text: #111; --muted: #555; --card: #fff; 
      --border: #e6e6e6; --btn2: #2d7d46; --viewer-bg: #ffffff;
    }
    body.offwhite-mode {
      --bg: #efebe2; --card: #fdfcf8; --border: #dcd7ca; --viewer-bg: #efebe2;
    }
    * { box-sizing: border-box; transition: all 0.3s ease; }
    body { margin: 0; font-family: Arial, sans-serif; background: var(--bg); color: var(--text); }
    .wrap { max-width: 980px; margin: 0 auto; padding: 26px 16px 42px; text-align: center; position: relative; }
    .theme-switch {
      position: absolute; top: 20px; right: 16px; background: var(--card); border: 1px solid var(--border);
      padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 13px; font-weight: bold; z-index: 100;
    }
    h1 { margin: 6px 0 10px; font-size: 34px; font-weight: 800; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; margin: 14px auto; }
    
    /* Modell-Selektor Style */
    #modelList { margin-top: 10px; text-align: left; }
    .select-style {
      width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--card); color: var(--text); font-size: 14px; cursor: pointer;
    }

    .status { padding: 12px; margin: 10px 0; border-radius: 6px; display: none; font-weight: 600; }
    .status.success { display: block; background: #d4edda; color: #155724; }
    .status.loading { display: block; background: #d1ecf1; color: #0c5460; }

    #shareArea { display: none; margin-top: 15px; }
    .share-flex { display: flex; align-items: center; justify-content: center; gap: 20px; background: rgba(0,0,0,0.02); padding: 15px; border-radius: 10px; border: 1px solid var(--border); }
    .shareLinkBox { background: #fff; border: 1px solid #ccc; padding: 10px; border-radius: 8px; font-family: monospace; font-size: 11px; color: #004a99; cursor: pointer; word-break: break-all; margin-top: 5px; }

    .viewerBox { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 12px; margin-top: 18px; display: none; }
    .viewerBox.active { display: block; }
    model-viewer { width: 100%; height: 60vh; min-height: 380px; background-color: var(--viewer-bg); border-radius: 12px; }
    .viewerBar { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin: 12px 0; }
    button.ui { border: 1px solid var(--border); background: var(--card); color: var(--text); border-radius: 10px; padding: 10px 12px; font-weight: 700; cursor: pointer; }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="theme-switch" id="themeToggle">🍦 Hintergrund ändern</div>
    <h1>3D Portfolio</h1>
    <p>Modelle werden automatisch aus GitHub geladen</p>

    <div class="card">
      <div id="modelList">
        <label style="font-size: 12px; font-weight: bold; color: var(--muted);">Modell auswählen:</label>
        <select id="modelSelector" class="select-style">
          <option>Lade Modelle...</option>
        </select>
      </div>
      <div id="status" class="status"></div>
      
      <div id="shareArea">
        <div class="share-flex">
          <div style="flex:1; text-align: left;">
            <label style="font-size: 11px; font-weight: bold;">Direkt-Link für AR:</label>
            <div id="shareLinkDisplay" class="shareLinkBox" onclick="copyLink()"></div>
          </div>
          <div id="qrcode"></div>
        </div>
      </div>
    </div>

    <div class="card viewerBox" id="viewerBox">
      <model-viewer id="mv" camera-controls ar ar-modes="webxr scene-viewer quick-look" bounds="tight" shadow-intensity="1"></model-viewer>
      <div class="viewerBar">
        <button class="ui" id="btnReset">↩️ Reset</button>
        <button class="ui" id="btnFullscreen">⛶ Vollbild</button>
        <button class="ui" id="btnAR">AR starten</button>
      </div>
    </div>
  </div>

  <script>
    // --- KONFIGURATION ---
    const GITHUB_USER = "DEIN_USER_NAME"; // Dein GitHub Name
    const GITHUB_REPO = "DEIN_REPO_NAME"; // Dein Repository Name
    const FOLDER_PATH = "models";       // Der Ordnername in deinem Repo
    // ---------------------

    const mv = document.getElementById('mv');
    const viewerBox = document.getElementById('viewerBox');
    const modelSelector = document.getElementById('modelSelector');
    const status = document.getElementById('status');
    const qrcodeDiv = document.getElementById('qrcode');
    const shareLinkDisplay = document.getElementById('shareLinkDisplay');

    document.getElementById('themeToggle').onclick = () => document.body.classList.toggle('offwhite-mode');

    function showStatus(msg, type) {
      status.textContent = msg;
      status.className = `status ${type}`;
      status.style.display = 'block';
    }

    // Modelle von GitHub API abrufen
    async function fetchModels() {
      const url = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${FOLDER_PATH}`;
      try {
        const response = await fetch(url);
        const data = await response.json();
        
        const models = data.filter(file => file.name.toLowerCase().endsWith('.glb'));
        
        if(models.length === 0) {
          showStatus("Keine .glb Modelle im Ordner gefunden.", "loading");
          return;
        }

        modelSelector.innerHTML = "";
        models.forEach((mod, index) => {
          const opt = document.createElement('option');
          opt.value = mod.download_url; // Der direkte Link zur Datei
          opt.textContent = mod.name;
          modelSelector.appendChild(opt);
        });

        loadModel(models[0].download_url);

      } catch (e) {
        showStatus("Fehler beim Laden der GitHub-Modelle.", "loading");
        console.error(e);
      }
    }

    modelSelector.onchange = (e) => loadModel(e.target.value);

    function loadModel(url) {
      mv.src = url;
      viewerBox.classList.add('active');
      
      // QR-Code und Link für AR generieren
      const currentShareUrl = window.location.origin + window.location.pathname + "?model=" + encodeURIComponent(url);
      shareLinkDisplay.textContent = currentShareUrl;
      qrcodeDiv.innerHTML = "";
      new QRCode(qrcodeDiv, { text: currentShareUrl, width: 80, height: 80 });
      document.getElementById('shareArea').style.display = "block";
      showStatus("Modell geladen", "success");
    }

    window.copyLink = () => {
      navigator.clipboard.writeText(shareLinkDisplay.textContent).then(() => alert("Link kopiert!"));
    };

    document.getElementById('btnReset').onclick = () => { mv.cameraOrbit = '0deg 75deg auto'; };
    document.getElementById('btnFullscreen').onclick = () => { if (mv.requestFullscreen) mv.requestFullscreen(); };
    document.getElementById('btnAR').onclick = () => { mv.activateAR(); };

    // Start
    const params = new URLSearchParams(window.location.search);
    if (params.get('model')) {
      loadModel(params.get('model'));
    } else {
      fetchModels();
    }
  </script>
</body>
</html>
